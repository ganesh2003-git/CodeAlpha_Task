spring.application.name=Data-Redundancy-Removal-System
server.port=${PORT:8080}
# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/data_quality_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
# Fixed: Hibernate 7 uses MySQLDialect, not MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

