<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>All Data Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

table tbody tr:hover{
background:#f1f3f5;
transition:0.3s;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Data Records</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="record : ${records}">

    <td th:text="${record.id}"></td>
    <td th:text="${record.name}"></td>
    <td th:text="${record.email}"></td>
    <td th:text="${record.phone}"></td>

    <td>

        <span th:if="${record.status == 'VALID'}"
              class="badge bg-success">VALID</span>

        <span th:if="${record.status == 'INVALID_EMAIL'}"
              class="badge bg-warning text-dark">INVALID EMAIL</span>

        <span th:if="${record.status == 'INVALID_PHONE'}"
              class="badge bg-danger">INVALID PHONE</span>

        <span th:if="${record.status == 'DUPLICATE'}"
              class="badge bg-secondary">DUPLICATE</span>

    </td>

</tr>

</tbody>
</table>

<div class="text-center mt-4">

<a href="/data/dashboard" class="btn btn-primary">
Back to Dashboard
</a>

</div>

</div>

</body>

</html>
